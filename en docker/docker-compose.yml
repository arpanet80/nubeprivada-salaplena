version: "3.8"

services:
  # ============================================
  # BACKEND API - Sala Plena
  # ============================================
  api:
    image: 10.51.15.42:5000/sala-plena-api:latest
    container_name: sala-plena-api
    hostname: sala-plena-api
    ports:
      - "3011:3011"
    restart: unless-stopped
    networks:
      - sala-plena-net
    environment:
      # ── Base de Datos ──
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PATH: ${POSTGRES_PATH}
      PORT: 3011
      NODE_ENV: production
      TZ: America/La_Paz

      # ── JWT ──
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}

      # ── Rate Limiting ──
      THROTTLE_SHORT_TTL: ${THROTTLE_SHORT_TTL}
      THROTTLE_SHORT_LIMIT: ${THROTTLE_SHORT_LIMIT}
      THROTTLE_MEDIUM_TTL: ${THROTTLE_MEDIUM_TTL}
      THROTTLE_MEDIUM_LIMIT: ${THROTTLE_MEDIUM_LIMIT}
      THROTTLE_LONG_TTL: ${THROTTLE_LONG_TTL}
      THROTTLE_LONG_LIMIT: ${THROTTLE_LONG_LIMIT}

      # ── LDAP / Active Directory ──
      LDAP_URL: ${LDAP_URL}
      LDAP_BIND_DN: ${LDAP_BIND_DN}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_USER_SEARCH_FILTER: ${LDAP_USER_SEARCH_FILTER}

      # ── Usuarios Permitidos ──
      ALLOWED_USERS: ${ALLOWED_USERS}

      # ── Cuenta de servicio compartida (Nextcloud + Backup SMB) ──
      SERVICE_ACCOUNT_USER: ${SERVICE_ACCOUNT_USER}
      SERVICE_ACCOUNT_PASSWORD: ${SERVICE_ACCOUNT_PASSWORD}

      # ── Nextcloud ──
      NEXTCLOUD_URL: ${NEXTCLOUD_URL}
      NEXTCLOUD_BASE_PATH: ${NEXTCLOUD_BASE_PATH}
      NEXTCLOUD_TIMEOUT_MS: ${NEXTCLOUD_TIMEOUT_MS}

      # ── Backup SMB ──
      BACKUP_ENABLED: ${BACKUP_ENABLED}
      BACKUP_SMB_HOST: ${BACKUP_SMB_HOST}
      BACKUP_SMB_SHARE: ${BACKUP_SMB_SHARE}
      BACKUP_SMB_PATH: ${BACKUP_SMB_PATH}
      BACKUP_SMB_DOMAIN: ${BACKUP_SMB_DOMAIN}
      BACKUP_DEV_MOCK: ${BACKUP_DEV_MOCK}

      # ── Email (Exchange EWS/NTLM) ──
      EWS_URL: ${EWS_URL}
      EMAIL_AUTH_DOMAIN: ${EMAIL_AUTH_DOMAIN}
      EMAIL_NTLM_WORKSTATION: ${EMAIL_NTLM_WORKSTATION}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_ACCOUNTFROM_ADDRESS: ${EMAIL_ACCOUNTFROM_ADDRESS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_RECIPIENTS: ${EMAIL_RECIPIENTS}

      # ── Puppeteer / Chrome ──
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: ${PUPPETEER_EXECUTABLE_PATH}

      # ── WhatsApp Web.js ──
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED}
      WHATSAPP_GROUP_NAME: ${WHATSAPP_GROUP_NAME}
      WHATSAPP_SESSION_PATH: ${WHATSAPP_SESSION_PATH}
      WHATSAPP_HEADLESS: ${WHATSAPP_HEADLESS}
      WHATSAPP_VOCAL_NUMBERS: ${WHATSAPP_VOCAL_NUMBERS}
      WHATSAPP_MAX_RECONNECT: ${WHATSAPP_MAX_RECONNECT}

      # ── Rotación ──
      ROTATION_ENABLED: ${ROTATION_ENABLED}
      ROTATION_FREE_SPACE_THRESHOLD_PERCENT: ${ROTATION_FREE_SPACE_THRESHOLD_PERCENT}
      ROTATION_SESSIONS_TO_REMOVE: ${ROTATION_SESSIONS_TO_REMOVE}
      ROTATION_MIN_AGE_DAYS: ${ROTATION_MIN_AGE_DAYS}
      ROTATION_VERIFY_BACKUP_BEFORE_DELETE: ${ROTATION_VERIFY_BACKUP_BEFORE_DELETE}

      # ── Upload ──
      UPLOAD_MAX_FILE_SIZE_MB: ${UPLOAD_MAX_FILE_SIZE_MB}
      UPLOAD_MAX_FILES: ${UPLOAD_MAX_FILES}
      UPLOAD_TEMP_PATH: ${UPLOAD_TEMP_PATH}
      UPLOAD_CLEANUP_AFTER_MINUTES: ${UPLOAD_CLEANUP_AFTER_MINUTES}

      # ── Enlaces Compartidos ──
      SHARE_LINK_EXPIRY_DAYS: ${SHARE_LINK_EXPIRY_DAYS}
      SHARE_PASSWORD_LENGTH: ${SHARE_PASSWORD_LENGTH}

    volumes:
      - api-uploads:/app/uploads/temp
      - api-whatsapp-session:/app/whatsapp-session
      - api-logs:/app/logs

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3011/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name,environment"

  # ============================================
  # FRONTEND UI - Sala Plena
  # ============================================
  app:
    image: 10.51.15.42:5000/sala-plena-ui:latest
    container_name: sala-plena-ui
    hostname: sala-plena-ui
    ports:
      - "8572:80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sala-plena-net
    environment:
      API_URL: 'http://10.51.15.41:3011/'
      API_URL_USER: 'http://10.51.15.41:3011/'
      REPORTS_URL: 'http://10.51.15.110:8123/api/reports/'
      DEBUG: "false"
      TZ: America/La_Paz

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# NETWORKS
# ============================================
networks:
  sala-plena-net:
    driver: bridge
    name: sala-plena-net
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ============================================
# VOLUMES
# ============================================
volumes:
  api-uploads:
    driver: local
  api-whatsapp-session:
    driver: local
  api-logs:
    driver: local