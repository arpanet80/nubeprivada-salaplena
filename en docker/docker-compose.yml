version: "3.8"

services:
  # ============================================
  # BACKEND API - Sala Plena
  # ============================================
  api:
    image: 10.51.15.42:5000/sala-plena-api:latest
    container_name: sala-plena-api
    hostname: sala-plena-api
    ports:
      - "3011:3011"
    restart: unless-stopped
    networks:
      - sala-plena-net
    environment:
      # ── Base de Datos ──
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PATH: ${POSTGRES_PATH}
      PORT: 3011
      NODE_ENV: production

      # ── JWT ──
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRATION: 1d

      # ── Rate Limiting ──
      THROTTLE_SHORT_TTL: 1000
      THROTTLE_SHORT_LIMIT: 3
      THROTTLE_MEDIUM_TTL: 60000
      THROTTLE_MEDIUM_LIMIT: 20
      THROTTLE_LONG_TTL: 3600000
      THROTTLE_LONG_LIMIT: 100

      # ── LDAP / Active Directory ──
      LDAP_URL: ldap://PTSDC01.oep.net
      LDAP_BIND_DN: CN=svc_ldap,OU=Servicios,DC=oep,DC=net
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_BASE_DN: DC=oep,DC=net
      LDAP_USER_SEARCH_FILTER: (sAMAccountName={{username}})

      # ── Usuarios Permitidos ──
      ALLOWED_USERS: '[{"usuario":"dante.ibanez","rol":1},{"usuario":"carla.jimenez","rol":3},{"usuario":"daniel.morodias","rol":3},{"usuario":"carlos.ramos","rol":3}]'

      # ── Nextcloud ──
      NEXTCLOUD_URL: https://nubeprivada.oep.org.bo
      NEXTCLOUD_BASE_PATH: SalaPlena
      NEXTCLOUD_SERVICE_USER: ${NEXTCLOUD_SERVICE_USER}
      NEXTCLOUD_SERVICE_PASSWORD: ${NEXTCLOUD_SERVICE_PASSWORD}
      NEXTCLOUD_TIMEOUT_MS: 30000
      NEXTCLOUD_VERIFY_SSL: "true"

      # ── Email (Exchange EWS) ──
      EMAIL_ENABLED: "true"
      EWS_URL: https://correo.oep.org.bo/EWS/Exchange.asmx
      EMAIL_AUTH_DOMAIN: OEP
      EMAIL_FROM_NAME: "NOTIFICADORA - TED Potosi"
      EMAIL_FROM_ADDRESS: dante.ibanez@oep.org.bo
      EMAIL_RECIPIENTS: dante.ibanez@oep.org.bo,carla.jimenez@oep.org.bo
      EMAIL_NTLM_WORKSTATION: BACKEND

      # ── Puppeteer / Chrome ──
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      # ── WhatsApp Web.js ──
      WHATSAPP_ENABLED: "true"
      WHATSAPP_GROUP_NAME: "Sala Plena Notificaciones"
      WHATSAPP_SESSION_PATH: /app/whatsapp-session
      WHATSAPP_HEADLESS: "true"
      WHATSAPP_VOCAL_NUMBERS: "59167924400,59168389003"
      WHATSAPP_MAX_RECONNECT: "10"
      WHATSAPP_QR_TIMEOUT_MS: "60000"

      # ── Backup SMB ──
      BACKUP_ENABLED: "true"
      BACKUP_SMB_HOST: 10.51.15.91
      BACKUP_SMB_SHARE: SalaPlena
      BACKUP_SMB_PATH: ""
      BACKUP_SMB_USERNAME: ${BACKUP_SMB_USERNAME}
      BACKUP_SMB_PASSWORD: ${BACKUP_SMB_PASSWORD}
      BACKUP_SMB_DOMAIN: oep.net
      BACKUP_VERIFY_CHECKSUM: "true"
      BACKUP_USE_SMBCLIENT: "false"
      BACKUP_DEV_MOCK: "false"

      # ── Rotación ──
      ROTATION_ENABLED: "true"
      ROTATION_CRON: "0 3 * * *"
      ROTATION_FREE_SPACE_THRESHOLD_PERCENT: "20"
      ROTATION_SESSIONS_TO_REMOVE: "5"
      ROTATION_MIN_AGE_DAYS: "15"
      ROTATION_VERIFY_BACKUP_BEFORE_DELETE: "true"

      # ── Upload ──
      UPLOAD_MAX_FILE_SIZE_MB: "100"
      UPLOAD_MAX_FILES: "50"
      UPLOAD_TEMP_PATH: /app/uploads/temp
      UPLOAD_CLEANUP_AFTER_MINUTES: "60"

      # ── Enlaces Compartidos ──
      SHARE_LINK_EXPIRY_DAYS: "10"
      SHARE_PASSWORD_LENGTH: "8"

      # ── Logging ──
      LOG_LEVEL: info
      LOG_TABLE: logs
      LOG_SCHEMA: ted
      LOG_RETENTION_DAYS: "90"
      LOG_MAX_ROWS: "100000"

    volumes:
      - api-uploads:/app/uploads/temp
      - api-whatsapp-session:/app/whatsapp-session
      - api-logs:/app/logs

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3011/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name,environment"

  # ============================================
  # FRONTEND UI - Sala Plena
  # ============================================
  app:
    image: 10.51.15.42:5000/sala-plena-ui:latest
    container_name: sala-plena-ui
    hostname: sala-plena-ui
    ports:
      - "8572:80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sala-plena-net
    environment:
      API_URL: 'http://10.51.15.41:3011/'
      API_URL_USER: 'http://10.51.15.41:3011/'
      REPORTS_URL: 'http://10.51.15.110:8123/api/reports/'
      DEBUG: "false"

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# NETWORKS
# ============================================
networks:
  sala-plena-net:
    driver: bridge
    name: sala-plena-net
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ============================================
# VOLUMES
# ============================================
volumes:
  api-uploads:
    driver: local
  api-whatsapp-session:
    driver: local
  api-logs:
    driver: local